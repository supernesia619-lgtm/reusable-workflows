name: Reusable OIDC
on:
  workflow_call:
jobs:
  oidc:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: OIDC in reusable context
        run: |
          echo "=== REUSABLE OIDC (supernesia workflow) ==="
          echo "CALLED_REPO=$GITHUB_REPOSITORY"
          echo "WORKFLOW_REF=$GITHUB_WORKFLOW_REF"
          RESP=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=github")
          JWT=$(echo "$RESP" | jq -r '.value')
          echo "--- JWT Claims ---"
          echo "$JWT" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub,repository,job_workflow_ref,workflow_ref,runner_environment}'
