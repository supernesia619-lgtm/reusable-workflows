name: Reusable OIDC
on:
  workflow_call:
jobs:
  oidc:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: OIDC claims in reusable context
        run: |
          echo "CALLED_REPO=$GITHUB_REPOSITORY"
          echo "WORKFLOW_REF=$GITHUB_WORKFLOW_REF"
          RESP=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=github")
          echo "$RESP" | python3 -c "
import sys,json,base64
d=json.loads(sys.stdin.read())
t=d.get("value","")
if t:
  p=t.split(".")[1]
  pl=json.loads(base64.b64decode(p+"==").decode())
  print("--- REUSABLE OIDC CLAIMS ---")
  for k,v in pl.items(): print(f"  {k}: {v}")
"
